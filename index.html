<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Señas Kiosco</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #052E2A;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #pantalla {
      display: grid;
      grid-template-columns: 40% 60%;
      grid-template-rows: 1fr auto;
      width: 100vw;
      height: 100vh;
    }
    #zona-avatar {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0B6E5E;
      padding: 2vw;
    }
    #avatar-label {
      font-size: 1.5vw;
      color: #2ABFA3;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1.5vh;
      font-weight: bold;
    }
    #video-lsc {
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 16px;
    }
    #zona-producto {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3vw;
      gap: 1.5vh;
    }
    #categoria {
      font-size: 1.8vw;
      color: #2ABFA3;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: bold;
    }
    #foto-wrap {
      width: 22vw;
      height: 28vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B6E5E;
      border-radius: 20px;
      overflow: hidden;
    }
    #foto {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }
    #nombre {
      font-size: 3.5vw;
      font-weight: bold;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.2;
      max-width: 55vw;
    }
    #precio-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    #precio-label {
      font-size: 1.4vw;
      color: #2ABFA3;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    #precio {
      font-size: 7vw;
      font-weight: bold;
      color: #F4A535;
      line-height: 1;
    }
    #qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #canvas-qr img, #canvas-qr canvas {
      border-radius: 12px;
      background: white;
      padding: 8px;
      display: block;
      width: 10vw !important;
      height: 10vw !important;
    }
    #qr-texto {
      font-size: 1.2vw;
      color: #9FE1CB;
      letter-spacing: 1px;
    }
    #barra-inferior {
      grid-column: 1 / 3;
      grid-row: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #041E1B;
      padding: 1vh 3vw;
    }
    #nombre-tienda {
      font-size: 1.5vw;
      color: #2ABFA3;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #logo-sk { font-size: 1.4vw; color: #2ABFA3; font-weight: bold; }
    #indicador-producto { font-size: 1.2vw; color: #4A7A72; }
  </style>
</head>
<body>
  <div id="pantalla">
    <div id="zona-avatar">
      <div id="avatar-label">Intérprete LSC</div>
      <video id="video-lsc" autoplay loop muted playsinline></video>
    </div>
    <div id="zona-producto">
      <div id="categoria">Cargando...</div>
      <div id="foto-wrap"><img id="foto" src="" alt="Producto"></div>
      <div id="nombre">--</div>
      <div id="precio-wrap">
        <span id="precio-label">Precio</span>
        <span id="precio">$0</span>
      </div>
      <div id="qr-wrap">
        <div id="canvas-qr"></div>
        <div id="qr-texto">Escanea para más info</div>
      </div>
    </div>
    <div id="barra-inferior">
      <div id="nombre-tienda"></div>
      <div id="logo-sk">🤟 Señas Kiosco</div>
      <div id="indicador-producto">
        <span id="num-actual">1</span> de <span id="num-total">0</span>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/catalogo.js"></script>
  <script src="js/video.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/carrusel.js"></script>
  <script>
    document.getElementById('nombre-tienda').textContent = CONFIG.NOMBRE_TIENDA;
    cargarCatalogo().then(function(productos) {
      if (!productos || productos.length === 0) {
        document.getElementById('nombre').textContent = 'Sin productos activos';
        return;
      }
      iniciarCarrusel(productos);
    });
  </script>
</body>
</html>
